# Customer Portal on Render — single combined web service (nginx + API).
# DNS: wildcard CNAME *.portals.hyegro.com → customer-portal-frontend.onrender.com
# Custom domains: add in Render on customer-portal-frontend (CRM can register via Render API).

services:
  - type: web
    name: customer-portal-frontend
    runtime: docker
    rootDir: CustomerPortal
    dockerfilePath: Dockerfile.render
    plan: starter
    healthCheckPath: /health
    envVars:
      - key: PYTHONUNBUFFERED
        value: "1"
      - key: DB
        sync: false
      - key: PORTAL_JWT_SECRET_KEY
        sync: false
      - key: PORTAL_CORS_ORIGINS
        sync: false
      - key: MAILTRAP_API_TOKEN
        sync: false
      - key: EMAIL_SENDER_ADDRESS
        sync: false
      - key: EMAIL_SENDER_NAME
        sync: false
    autoDeploy: true
